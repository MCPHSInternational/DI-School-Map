<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MCPHS Recruitment Map</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:#f4f4f4;color:#1a1a1a}
#topbar{background:#a02842;color:#fff;padding:0 16px;height:50px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:1000}
#topbar h1{font-size:15px;font-weight:600}
.pill{background:rgba(255,255,255,.15);border-radius:99px;padding:3px 10px;font-size:12px;margin-left:6px}
.tbtn{background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.3);border-radius:6px;padding:4px 10px;color:#fff;font-size:12px;cursor:pointer;margin-left:6px}
#layout{display:grid;grid-template-columns:280px 1fr;height:calc(100vh - 50px)}
#sidebar{background:#fff;border-right:1px solid #ddd;display:flex;flex-direction:column;overflow:hidden}
#fp{padding:10px 12px;border-bottom:1px solid #eee;background:#fafafa;flex-shrink:0}
#fp h3{font-size:10px;font-weight:700;color:#666;text-transform:uppercase;letter-spacing:.05em;margin-bottom:8px}
.fr{display:flex;align-items:center;justify-content:space-between;margin-bottom:5px}
.fl{display:flex;align-items:center;gap:7px;font-size:12px;color:#333;cursor:pointer}
.fd{width:9px;height:9px;border-radius:50%;flex-shrink:0}
.fc{font-size:11px;color:#888;background:#f0f0f0;border-radius:99px;padding:1px 7px}
#sf-wrap{padding:6px 12px;border-bottom:1px solid #eee;flex-shrink:0}
#sf-wrap label{font-size:10px;font-weight:700;color:#666;text-transform:uppercase;letter-spacing:.05em;display:block;margin-bottom:3px}
#sf{width:100%;padding:5px 7px;font-size:12px;border:1px solid #ddd;border-radius:5px}
#sb{padding:7px 10px;border-bottom:1px solid #eee;flex-shrink:0}
#sb input{width:100%;padding:6px 8px;font-size:12px;border:1px solid #ddd;border-radius:5px}
#sl{flex:1;overflow-y:auto}
.si{display:flex;align-items:flex-start;gap:7px;padding:8px 12px;border-bottom:1px solid #f0f0f0;cursor:pointer}
.si:hover{background:#f9f9f9}
.si.sel{background:#fef0f2;border-left:3px solid #a02842}
.si-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0;margin-top:3px}
.si-name{font-size:12px;font-weight:500}
.si-loc{font-size:11px;color:#888;margin-top:1px}
.si-tag{font-size:10px;padding:1px 6px;border-radius:99px;font-weight:500;margin-right:3px;margin-top:3px;display:inline-block}
#map-wrap{position:relative;height:100%}
#map{width:100%;height:100%}
.legend{position:absolute;bottom:28px;right:10px;background:#fff;border:1px solid #ddd;border-radius:8px;padding:8px 12px;z-index:500;font-size:11px;box-shadow:0 2px 6px rgba(0,0,0,.1)}
.lr{display:flex;align-items:center;gap:6px;margin-bottom:3px}
.lr:last-child{margin-bottom:0}
.ld{width:9px;height:9px;border-radius:50%;flex-shrink:0}
#dp{position:fixed;top:50px;right:0;width:300px;height:calc(100vh - 50px);background:#fff;border-left:1px solid #ddd;z-index:700;display:none;flex-direction:column;overflow-y:auto;box-shadow:-2px 0 6px rgba(0,0,0,.1)}
#dp.open{display:flex}
.dph{background:#a02842;color:#fff;padding:12px 14px;flex-shrink:0;position:relative}
.dph h2{font-size:13px;font-weight:600;margin-bottom:2px;padding-right:28px}
.dph p{font-size:11px;color:rgba(255,255,255,.75);margin:0}
.dpx{position:absolute;top:8px;right:10px;background:none;border:none;color:#fff;font-size:22px;cursor:pointer;line-height:1}
.dpb{padding:12px;display:flex;flex-direction:column;gap:8px}
.dps{border:1px solid #eee;border-radius:6px;overflow:hidden}
.dpsh{background:#f5f5f5;padding:4px 10px;font-size:10px;font-weight:700;color:#666;text-transform:uppercase;letter-spacing:.05em}
.dpsb{padding:8px 10px;display:flex;flex-direction:column;gap:5px}
.dpr{display:flex;gap:8px;align-items:flex-start}
.dpl{font-size:11px;color:#888;min-width:65px;flex-shrink:0;padding-top:3px}
.dpv{font-size:12px;color:#333;flex:1}
.dpf{width:100%;padding:4px 7px;font-size:12px;border:1px solid #ddd;border-radius:4px;font-family:inherit}
.dpsv{width:100%;padding:8px;background:#0F6E56;color:#fff;border:none;border-radius:5px;cursor:pointer;font-size:12px;font-weight:500;margin-top:4px}
.empty{padding:20px;text-align:center;color:#888;font-size:12px}
</style>
</head>
<body>
<div id="topbar">
  <h1>MCPHS Recruitment Map</h1>
  <div style="display:flex;align-items:center">
    <span class="pill">Total: <b id="s-total">0</b></span>
    <span class="pill">Shown: <b id="s-shown">0</b></span>
  </div>
  <div>
    <button class="tbtn" onclick="showAll()">Show all</button>
    <button class="tbtn" onclick="hideAll()">Hide all</button>
    <button class="tbtn" onclick="saveFile()" style="background:rgba(255,255,255,.25);border-color:rgba(255,255,255,.5);font-weight:500">&#8595; Save file</button>
  </div>
</div>
<div id="layout">
  <div id="sidebar">
    <div id="fp">
      <h3>Filter by type</h3>
      <div class="fr"><label class="fl"><input type="checkbox" id="f-sec" checked onchange="applyFilters()"><div class="fd" style="background:#1A3C5E"></div>Secondary Schools</label><span class="fc" id="fc-sec">0</span></div>
      <div class="fr"><label class="fl"><input type="checkbox" id="f-cc" checked onchange="applyFilters()"><div class="fd" style="background:#0F6E56"></div>Community Colleges</label><span class="fc" id="fc-cc">0</span></div>
      <div class="fr"><label class="fl"><input type="checkbox" id="f-uni" checked onchange="applyFilters()"><div class="fd" style="background:#854F0B"></div>Universities</label><span class="fc" id="fc-uni">0</span></div>
      <div class="fr" style="margin-top:6px;padding-top:6px;border-top:1px solid #eee"><label class="fl"><input type="checkbox" id="f-prior" onchange="applyFilters()"><div class="fd" style="background:#a02842"></div>Prior Enrollment only</label><span class="fc" id="fc-prior">0</span></div>
    </div>
    <div id="sf-wrap">
      <label>State</label>
      <select id="sf" onchange="applyFilters()"><option value="">All states</option></select>
    </div>
    
<div id="add-bar" style="padding:8px 10px;border-bottom:1px solid #eee;background:#fafafa;flex-shrink:0">
  <button onclick="toggleAddForm()" style="width:100%;padding:6px;background:#a02842;color:#fff;border:none;border-radius:5px;cursor:pointer;font-size:12px;font-weight:500">+ Add school</button>
  <div id="add-form" style="display:none;margin-top:8px;display:none">
    <input id="add-name" placeholder="School name *" style="width:100%;padding:5px 7px;font-size:12px;border:1px solid #ddd;border-radius:4px;margin-bottom:4px"/>
    <div style="display:flex;gap:4px;margin-bottom:4px">
      <input id="add-city" placeholder="City *" style="flex:1;padding:5px 7px;font-size:12px;border:1px solid #ddd;border-radius:4px"/>
      <input id="add-state" placeholder="ST *" maxlength="2" style="width:40px;padding:5px 7px;font-size:12px;border:1px solid #ddd;border-radius:4px;text-transform:uppercase"/>
    </div>
    <select id="add-type" style="width:100%;padding:5px 7px;font-size:12px;border:1px solid #ddd;border-radius:4px;margin-bottom:4px">
      <option>Secondary School</option>
      <option>Community College</option>
      <option>University</option>
    </select>
    <label style="font-size:11px;color:#555;display:flex;align-items:center;gap:5px;margin-bottom:6px">
      <input type="checkbox" id="add-prior"> Prior MCPHS enrollment
    </label>
    <div style="display:flex;gap:4px">
      <button onclick="addSchool()" style="flex:1;padding:6px;background:#0F6E56;color:#fff;border:none;border-radius:4px;cursor:pointer;font-size:12px">Add</button>
      <button onclick="toggleAddForm()" style="flex:1;padding:6px;background:#eee;color:#555;border:none;border-radius:4px;cursor:pointer;font-size:12px">Cancel</button>
    </div>
  </div>
</div>
<div id="sb"><input id="search" placeholder="Search schools..." oninput="applyFilters()"/></div>
    <div id="sl"></div>
  </div>
  <div id="map-wrap">
    <div id="map"></div>
    <div class="legend">
      <div class="lr"><div class="ld" style="background:#1A3C5E"></div>Secondary</div>
      <div class="lr"><div class="ld" style="background:#0F6E56"></div>Comm. College</div>
      <div class="lr"><div class="ld" style="background:#854F0B"></div>University</div>
      <div class="lr"><div class="ld" style="background:#a02842;border:2px solid #a02842;background:transparent;border-radius:50%"></div>Prior Enrollment</div>
    </div>
  </div>
</div>
<div id="dp">
  <div class="dph"><h2 id="dp-n"></h2><p id="dp-l"></p><button class="dpx" onclick="dpClose()">&#215;</button></div>
  <div class="dpb" id="dp-b"></div>
</div>

var nextId = 500;
var COLORS = {"Secondary School":"#1A3C5E","Community College":"#0F6E56","University":"#854F0B"};
var map, markers = {}, selId = null;

function getColor(s) {
  return COLORS[s.type] || "#888";
}

function makeIcon(s, show) {
  if (!show) return L.divIcon({className:"",html:"<div style=\"width:8px;height:8px;border-radius:50%;background:#ccc;border:1.5px solid #fff;opacity:0.3\"></div>",iconSize:[8,8],iconAnchor:[4,4]});
  var c = getColor(s);
  var ring = s.prior ? ";box-shadow:0 0 0 2px #a02842,0 1px 4px rgba(0,0,0,.3)" : ";box-shadow:0 1px 4px rgba(0,0,0,.3)";
  var sz = 10;
  return L.divIcon({className:"",html:"<div style=\"width:"+sz+"px;height:"+sz+"px;border-radius:50%;background:"+c+";border:2px solid #fff"+ring+"\"></div>",iconSize:[sz,sz],iconAnchor:[sz/2,sz/2]});
}

function initMap() {
  map = L.map("map").setView([42.5,-72],6);
  L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png",{attribution:"&copy; OpenStreetMap contributors",maxZoom:19}).addTo(map);
  SCHOOLS.forEach(function(s) {
    if (!s.lat || !s.lng) return;
    var m = L.marker([s.lat,s.lng],{icon:makeIcon(s,true)}).addTo(map);
    m.bindTooltip(s.name + '<br><span style="color:#888;font-size:11px">' + s.city + ', ' + s.state + '</span>', {direction:'top', offset:[0,-6]});
    m.on("click",function(){showDetail(s.id);});
    markers[s.id] = m;
  });
}

function typeOn(s) {
  if (s.type === "Secondary School") return document.getElementById("f-sec").checked;
  if (s.type === "Community College") return document.getElementById("f-cc").checked;
  if (s.type === "University") return document.getElementById("f-uni").checked;
  return true;
}

function applyFilters() {
  var q = document.getElementById("search").value.toLowerCase();
  var st = document.getElementById("sf").value;
  var priorOnly = document.getElementById("f-prior").checked;
  var shown = 0, cards = [];
  var counts = {"Secondary School":0,"Community College":0,"University":0,prior:0};
  SCHOOLS.forEach(function(s) {
    if (s.type in counts) counts[s.type]++;
    if (s.prior) counts.prior++;
    var show = (typeOn(s) || priorOnly) && s.name.toLowerCase().includes(q) && (!st || s.state===st) && (!priorOnly || s.prior);
    if (markers[s.id]) {
      if (show) { markers[s.id].addTo(map); markers[s.id].setIcon(makeIcon(s,true)); markers[s.id].setTooltipContent(s.name+'<br><span style="color:#888;font-size:11px">'+s.city+', '+s.state+(s.recruiter ? ' &nbsp;&#183;&nbsp; <b>'+s.recruiter+'</b>' : '')+'</span>'); }
      else { map.removeLayer(markers[s.id]); }
    }
    if (show) {
      shown++;
      var c = getColor(s);
      var tags = '<span class="si-tag" style="background:'+(COLORS[s.type]||"#eee")+'22;color:'+(COLORS[s.type]||"#555")+'">'+s.type+'</span>';
      if (s.prior) tags += '<span class="si-tag" style="background:#fdecea;color:#a02842">Prior enrollment</span>';
      if (s.recruiter) tags += '<span class="si-tag" style="background:#E6F1FB;color:#0C447C">'+s.recruiter+'</span>';
      cards.push('<div class="si'+(s.id===selId?" sel":"#")+'" style="position:relative" onclick="showDetail('+s.id+')"><div class="si-dot" style="background:'+c+'"></div><div style="flex:1;min-width:0"><div class="si-name">'+s.name+'</div><div class="si-loc">'+s.city+(s.city&&s.state?", ":"")+s.state+'</div><div>'+tags+'</div></div><button onclick="event.stopPropagation();deleteSchool('+s.id+')" style="position:absolute;top:8px;right:8px;background:none;border:none;color:#ccc;cursor:pointer;font-size:14px;padding:0;line-height:1" title="Remove school">&times;</button></div>');
    }
  });
  document.getElementById("sl").innerHTML = cards.length ? cards.join("") : '<div class="empty">No schools match</div>';
  document.getElementById("s-total").textContent = SCHOOLS.length;
  document.getElementById("s-shown").textContent = shown;
  document.getElementById("fc-sec").textContent = counts["Secondary School"];
  document.getElementById("fc-cc").textContent = counts["Community College"];
  document.getElementById("fc-uni").textContent = counts["University"];
  document.getElementById("fc-prior").textContent = counts.prior;
}

function populateStateFilter() {
  var states = [...new Set(SCHOOLS.map(function(s){return s.state;}).filter(Boolean))].sort();
  var sel = document.getElementById("sf");
  sel.innerHTML = "<option value=''>All states</option>" + states.map(function(s){return "<option value='"+s+"'>"+s+"</option>";}).join("");
}

function showAll() {
  ["f-sec","f-cc","f-uni"].forEach(function(id){document.getElementById(id).checked=true;});
  document.getElementById("f-prior").checked=false;
  applyFilters();
}

function hideAll() {
  ["f-sec","f-cc","f-uni","f-prior"].forEach(function(id){document.getElementById(id).checked=false;});
  applyFilters();
}

function dpClose() {
  document.getElementById("dp").classList.remove("open");
  selId = null;
  applyFilters();
}

function showDetail(id) {
  selId = id;
  var s = SCHOOLS.find(function(x){return x.id===id;});
  if (!s) return;
  if (s.lat && s.lng) map.setView([s.lat,s.lng],12);
  document.getElementById("dp-n").textContent = s.name;
  document.getElementById("dp-l").textContent = [s.city,s.state,s.type].filter(Boolean).join(" - ");
  var tl = s.tool||"";
  var to = ["","Scoir","MaiaLearning","Naviance","Cialfo","Other"].map(function(t){return "<option"+(tl===t?" selected":"")+">"+t+"</option>";}).join("");
  var vs = s.visitStatus||"Not Started";
  var so = ["Not Started","Scheduled","Confirmed","Completed","Cancelled"].map(function(v){return "<option"+(vs===v?" selected":"")+">"+v+"</option>";}).join("");
  var h = "";
  h += '<div style="font-size:11px;color:#666;margin-bottom:4px">Type: <b>'+s.type+'</b>';
  if (s.prior) h += ' &nbsp;<span style="background:#fdecea;color:#a02842;padding:1px 7px;border-radius:99px;font-size:10px;font-weight:500">Prior Enrollment</span>';
  h += "</div>";
  h += '<div class="dps"><div class="dpsh">Contact</div><div class="dpsb">';
  h += '<div class="dpr"><div class="dpl">Name</div><input class="dpf" id="dc-n" value="'+(s.ccName||"")+'"/></div>';
  h += '<div class="dpr"><div class="dpl">Phone</div><input class="dpf" id="dc-p" value="'+(s.phone||"")+'"/></div>';
  h += '<div class="dpr"><div class="dpl">Email</div><input class="dpf" id="dc-e" value="'+(s.email||"")+'"/></div>';
  h += '<div class="dpr"><div class="dpl">Website</div><input class="dpf" id="dc-w" value="'+(s.website||"")+'"/></div>';
  h += "</div></div>";
  h += '<div class="dps"><div class="dpsh">Scheduling</div><div class="dpsb">';
  h += '<div class="dpr"><div class="dpl">Tool</div><select class="dpf" id="dc-t">'+to+"</select></div>";
  h += '<div class="dpr"><div class="dpl">Event</div><input class="dpf" type="date" id="dc-d" value="'+(s.eventDate||"")+'"/></div>';
  h += "</div></div>";
  h += '<div class="dps"><div class="dpsh">Visit Info</div><div class="dpsb">';h += '<div class="dpr"><div class="dpl">Recruiter</div><input class="dpf" id="dc-r" placeholder="Recruiter name" value="'+(s.recruiter||'')+'"/></div>';
  h += '<div class="dpr"><div class="dpl">Status</div><select class="dpf" id="dc-s">'+so+"</select></div>";
  h += '<div class="dpr"><div class="dpl">Intl Focus</div><input class="dpf" id="dc-i" value="'+(s.intlFocus||"")+'"/></div>';
  h += "</div></div>";
  h += '<div class="dps"><div class="dpsh">Notes</div><div class="dpsb">';
  h += '<textarea class="dpf" id="dc-nt" rows="4" style="resize:vertical">'+(s.notes||"")+"</textarea>";
  h += "</div></div>";
  h += '<button class="dpsv" onclick="dpSave('+id+')">Save changes</button>';
  document.getElementById("dp-b").innerHTML = h;
  document.getElementById("dp").classList.add("open");
  applyFilters();
}

function dpSave(id) {
  var s = SCHOOLS.find(function(x){return x.id===id;});
  if (!s) return;
  s.ccName = document.getElementById("dc-n").value;
  s.phone = document.getElementById("dc-p").value;
  s.email = document.getElementById("dc-e").value;
  s.website = document.getElementById("dc-w").value;
  s.tool = document.getElementById("dc-t").value;
  s.eventDate = document.getElementById("dc-d").value;
  s.visitStatus = document.getElementById("dc-s").value;
  s.recruiter = document.getElementById("dc-r").value;
  s.intlFocus = document.getElementById("dc-i").value;
  s.notes = document.getElementById("dc-nt").value;
  var b = document.querySelector(".dpsv");
  b.textContent = "Saved!"; b.style.background = "#185FA5";
  setTimeout(function(){b.textContent="Save changes";b.style.background="#0F6E56";},1500);
}

    ND:[47.528,-99.784],SD:[44.299,-99.438],NE:[41.492,-99.901],KS:[38.527,-96.726],

  var center = STATE_CENTERS[state] || [39.5,-98.35];
  var lat = center[0] + (Math.random()-0.5)*1.5;
  var lng = center[1] + (Math.random()-0.5)*2;

  var s = {id:nextId++,name:name,city:city,state:state,type:type,prior:prior,
    lat:lat,lng:lng,phone:"",email:"",website:"",ccName:"",tool:"",
    eventDate:"",visitStatus:"Not Started",notes:"",intlFocus:""};
  SCHOOLS.push(s);

  var m = L.marker([s.lat,s.lng],{icon:makeIcon(s,true)}).addTo(map);
  m.bindTooltip(s.name+'<br><span style="color:#888;font-size:11px">'+s.city+', '+s.state+(s.recruiter ? ' &nbsp;&#183;&nbsp; <b>'+s.recruiter+'</b>' : '')+'</span>',{direction:'top',offset:[0,-6]});
  m.on('click',function(){showDetail(s.id);});
  markers[s.id] = m;

  document.getElementById('add-name').value='';
  document.getElementById('add-city').value='';
  document.getElementById('add-state').value='';
  document.getElementById('add-prior').checked=false;
  toggleAddForm();
  applyFilters();
  map.setView([lat,lng],10);
}

function deleteSchool(id) {
  if (!confirm('Remove this school from the map?')) return;
  var idx = SCHOOLS.findIndex(function(s){return s.id===id;});
  if (idx !== -1) SCHOOLS.splice(idx,1);
  if (markers[id]) { map.removeLayer(markers[id]); delete markers[id]; }
  if (selId === id) dpClose();
  applyFilters();
}

function saveFile() {
  // Build updated SCHOOLS array as JS
  var schoolsJs = 'const SCHOOLS = [\n  ' + SCHOOLS.map(function(s) {
    return '{id:'+s.id+',name:"'+s.name.replace(/\\/g,'\\\\').replace(/"/g,'\\"')+'",city:"'+s.city.replace(/"/g,'\\"')+'",state:"'+s.state+'",type:"'+s.type+'",prior:'+(s.prior?'true':'false')+',lat:'+(s.lat||'null')+',lng:'+(s.lng||'null')+',phone:"'+(s.phone||'')+'",email:"'+(s.email||'')+'",website:"'+(s.website||'')+'",ccName:"'+(s.ccName||'')+'",tool:"'+(s.tool||'')+'",eventDate:"'+(s.eventDate||'')+'",visitStatus:"'+(s.visitStatus||'Not Started')+'",notes:"'+(s.notes||'').replace(/"/g,'\\"')+'",intlFocus:"'+(s.intlFocus||'')+'"}';
  }).join(',\n  ') + '\n];';

  // Get current HTML and replace SCHOOLS array
  var html = document.documentElement.outerHTML;
  var start = html.indexOf('const SCHOOLS = [');
  var end = html.indexOf('];', start) + 2;
  if (start === -1 || end === 1) { alert('Could not save — please try again.'); return; }
  var newHtml = html.substring(0, start) + schoolsJs + html.substring(end);

  var blob = new Blob([newHtml], {type: 'text/html'});
  var a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'index.html';
  a.click();
}

window.addEventListener("load", function() {
  initMap();
  populateStateFilter();
  applyFilters();
});
</script>
